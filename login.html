<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>超スケジュールくん ログイン</title>
  <link rel="stylesheet" href="style.css?v=slash-date-1">
</head>
<body class="login-mode">
  <header class="header">
    <a class="logo" href="super-schedule-kun.html" aria-label="超スケジュールくん ホーム">
      <span class="logo-mark">超</span>
      <span>超スケジュールくん</span>
    </a>
    <nav class="nav" aria-label="ページナビゲーション">
      <a href="super-schedule-kun.html">ホーム</a>
      <a href="login.html" class="active">ログイン</a>
      <a href="features.html">機能</a>
      <a href="use-cases.html">活用シーン</a>
    </nav>
  </header>

  <main class="login-shell">
    <section class="login-hero" aria-labelledby="login-title">
      <p class="eyebrow">SIGN IN</p>
      <h1 id="login-title">アカウントで続ける</h1>
      <p class="lead">メールアドレス、または外部アカウントでログインすると、自分専用のスケジュールを保存できます。</p>
    </section>

    <section class="auth-panel login-panel" aria-label="ログイン">
      <div class="planner-panel-head">
        <h2>超スケジュールくんを使う</h2>
        <span class="planner-hint">新規登録はメールアドレスだけで始められます</span>
      </div>

      <form class="auth-form login-auth-form" id="login-auth-form">
        <label>
          <span>メールアドレス</span>
          <input id="login-auth-email" type="email" autocomplete="email" placeholder="you@example.com">
        </label>
        <label>
          <span>パスワード（ログイン時）</span>
          <input id="login-auth-password" type="password" autocomplete="current-password" minlength="6" placeholder="登録後に設定">
        </label>
        <div class="auth-actions">
          <button class="button primary" type="submit">ログイン</button>
          <button class="button" type="button" id="login-signup-button">登録メールを送信</button>
          <button class="button" type="button" id="login-resend-button">登録メールを再送</button>
        </div>
      </form>

      <div class="oauth-actions oauth-actions-branded" aria-label="外部アカウントでログイン">
        <button class="button" type="button" data-login-oauth="google">
          <span class="oauth-logo oauth-google" aria-hidden="true">G</span>
          <span>Googleで続ける</span>
        </button>
        <button class="button" type="button" data-login-oauth="twitter">
          <span class="oauth-logo oauth-x" aria-hidden="true">X</span>
          <span>Xで続ける</span>
        </button>
        <button class="button" type="button" data-login-oauth="azure">
          <span class="oauth-logo oauth-microsoft" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
          <span>Microsoftで続ける</span>
        </button>
        <button class="button" type="button" data-login-oauth="facebook">
          <span class="oauth-logo oauth-instagram" aria-hidden="true"></span>
          <span>Instagram/Metaで続ける</span>
        </button>
      </div>

      <div class="demo-entry">
        <button class="button primary" type="button" id="login-demo-button">おためしで使う</button>
        <p>おためしでは通知を使わず、閉じると予定は消えます。</p>
      </div>

      <p class="auth-status" id="login-auth-status">ログインまたはおためしで予定管理へ進めます。</p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" onerror="this.onerror=null;this.src='https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js';"></script>
  <script>
    window.SUPER_SCHEDULE_CONFIG = {
      supabaseUrl: "https://ealykpoepyqpuxtfqabf.supabase.co",
      supabaseAnonKey: "sb_publishable_lo7QUF2qKnhf7GLBjyz1lw_eu0fhF5l",
      authRedirectUrl: "https://mobsidianez-boop.github.io/super-schedule-kun-copy/app.html"
    };
  </script>
  <script src="login.js?v=slash-date-1"></script>
</body>
</html>
